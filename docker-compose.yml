services:
  ai-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-studio
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    user: "0:0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
