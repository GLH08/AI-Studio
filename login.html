<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Studio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M15.477 0c.415 0 .749.338.788.752a7.775 7.775 0 006.985 6.984c.413.04.752.373.752.788v6.952c0 .415-.338.748-.752.788a7.775 7.775 0 00-6.985 6.984c-.04.414-.373.752-.788.752H8.525c-.416 0-.749-.338-.789-.752a7.775 7.775 0 00-6.984-6.984c-.414-.04-.752-.373-.752-.788V8.524c0-.415.338-.748.752-.788A7.775 7.775 0 007.736.752C7.776.338 8.11 0 8.526 0h6.95z' fill='%238B5CF6'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                    colors: {
                        accent: { blue: '#007AFF', purple: '#BF5AF2', pink: '#FF375F', cyan: '#5AC8FA' }
                    }
                }
            }
        }
    </script>
    <style>
        /* ===== CSS Variables - Dark Theme ===== */
        [data-theme="dark"] {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-bg-active: rgba(255, 255, 255, 0.16);
            --glass-border: rgba(255, 255, 255, 0.14);
            --glass-border-strong: rgba(255, 255, 255, 0.24);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-tertiary: rgba(255, 255, 255, 0.45);
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #BF5AF2 50%, #FF375F 100%);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --shadow-button: 0 4px 16px rgba(0, 122, 255, 0.35);
        }

        /* ===== CSS Variables - Light Theme ===== */
        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.70);
            --glass-bg-hover: rgba(255, 255, 255, 0.85);
            --glass-bg-active: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.10);
            --glass-border-strong: rgba(0, 0, 0, 0.20);
            --text-primary: rgba(0, 0, 0, 0.95);
            --text-secondary: rgba(0, 0, 0, 0.65);
            --text-tertiary: rgba(0, 0, 0, 0.45);
            --bg-primary: #f5f5f7;
            --bg-secondary: #e8e8ed;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #BF5AF2 50%, #FF375F 100%);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            --shadow-button: 0 4px 16px rgba(0, 122, 255, 0.25);
        }

        /* ===== Base Styles ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ===== Glass Effect ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-glass);
        }

        /* ===== Primary Button ===== */
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
            filter: brightness(1.05);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }

        /* ===== Input ===== */
        .glass-input {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            width: 100%;
            padding: 1rem 1.25rem;
        }
        .glass-input::placeholder {
            color: var(--text-tertiary);
        }
        .glass-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        /* ===== Text Colors ===== */
        .text-primary { color: var(--text-primary); }
        .text-secondary { color: var(--text-secondary); }
        .text-tertiary { color: var(--text-tertiary); }

        /* ===== Accent Gradient Text ===== */
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== Animations ===== */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-float { animation: float 8s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @media (prefers-reduced-motion: reduce) { .animate-float { animation: none; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">
    <!-- Aurora Background -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute -top-1/3 -left-1/4 w-[700px] h-[700px] rounded-full" style="background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%);"></div>
        <div class="absolute -bottom-1/4 -right-1/4 w-[600px] h-[600px] rounded-full" style="background: radial-gradient(circle, rgba(191,90,242,0.10) 0%, transparent 70%);"></div>
    </div>

    <div class="w-full max-w-md">
        <div class="glass p-10 animate-fade-in">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <div class="w-20 h-20 rounded-2xl flex items-center justify-center animate-float" style="background: var(--accent-gradient); box-shadow: 0 8px 32px rgba(0, 122, 255, 0.3);">
                    <i data-lucide="sparkles" class="w-10 h-10 text-white"></i>
                </div>
            </div>
            <!-- Title -->
            <div class="text-center mb-10">
                <h1 class="font-serif text-3xl font-semibold mb-2 text-primary">Welcome Back</h1>
                <p class="text-secondary">Enter your password to continue</p>
            </div>
            <!-- Form -->
            <form id="loginForm" class="space-y-6">
                <div class="space-y-3">
                    <label for="password" class="text-sm font-medium text-secondary">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autofocus class="glass-input text-lg">
                </div>
                <button type="submit" class="btn-primary w-full h-14 text-lg">
                    Sign In
                </button>
                <p id="errorMsg" class="hidden text-center text-sm glass p-4" style="border-color: rgba(255, 59, 95, 0.3); color: #FF375F;">
                    Invalid password. Please try again.
                </p>
            </form>
        </div>
        <!-- Footer -->
        <p class="text-center text-tertiary text-sm mt-8">
            Powered by <span class="text-gradient font-semibold">AI Studio</span>
        </p>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.add('hidden');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (res.ok) location.href = '/';
                else errorMsg.classList.remove('hidden');
            } catch (e) {
                errorMsg.innerText = 'Connection error. Please try again.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
